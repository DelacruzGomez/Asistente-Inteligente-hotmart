<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Ventas Inteligente - Curso de Apps</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
        }
        
        .widget-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        #chatButton {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }
        #chatButton:hover {
            transform: scale(1.05);
        }

        #chatWindow {
            background-color: white;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            width: 350px;
            height: 500px;
            margin-bottom: 10px;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        
        @media (max-width: 480px) {
            #chatWindow {
                width: calc(100vw - 40px);
                height: 75vh;
            }
        }

        #chatWindow.open {
            display: flex;
        }

        .message-area {
            flex-grow: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .user-message {
            align-self: flex-end;
            background-color: #4f46e5;
            color: white;
            padding: 0.6rem 0.9rem;
            border-radius: 0.75rem 0.75rem 0.25rem 0.75rem;
            max-width: 85%;
            word-break: break-word;
        }
        .bot-message {
            align-self: flex-start;
            background-color: #e0f2fe;
            color: #1e40af;
            padding: 0.6rem 0.9rem;
            border-radius: 0.75rem 0.75rem 0.75rem 0.25rem;
            max-width: 85%;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            word-break: break-word;
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <div id="chatWindow" class="chat-container">
            <header class="p-3 bg-indigo-600 text-white shadow-md rounded-t-xl flex justify-between items-center">
                <div>
                    <h2 class="text-md font-bold">Asistente Virtual IA</h2>
                    <p class="text-xs text-indigo-100">Cupos con Descuento Activos</p>
                </div>
                <button onclick="toggleChat()" class="text-white hover:text-indigo-200 p-1">
                    <svg xmlns="http://w3.org" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </header>

            <div id="messageArea" class="message-area"></div>

            <div class="p-3 border-t border-gray-200 flex space-x-2 bg-white">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="Escribe tu duda aquí..." 
                    class="flex-grow p-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    onkeypress="if(event.key === 'Enter') sendMessage()"
                >
                <button 
                    id="sendButton"
                    onclick="sendMessage()"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-3 rounded-lg shadow-md flex items-center justify-center"
                >
                    <svg xmlns="http://w3.org" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>

        <div id="chatButton" class="bg-indigo-600 text-white" onclick="toggleChat()">
            <svg id="chatIcon" xmlns="http://w3.org" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
        </div>
    </div>
    <script>
        // Claves y Enlaces Oficiales Corregidos
        const apiKey = "AQ.Ab8RN6Loq9E24h5vFoMAyukyeWRZ457p8faaQ7uXGH-B95dReg"; 
        const apiUrl = "https://googleapis.com" + apiKey;
        const linkAfiliado = "https://go.hotmart.com/N106692793T"; 

        const chatWindow = document.getElementById('chatWindow');
        const messageArea = document.getElementById('messageArea');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');
        
        let conversationHistory = [];

        const systemPrompt = `
Eres un Asistente Experto de Ventas altamente persuasivo. Tu objetivo es vender el programa.
Nombre del producto: Aprende Cómo Crear Apps de Éxito y Sencillas ¡Sin Programar!
Temario: Monetizar apps sin inversión, sin saber programar, publicarlas en Google Play y App Store, y conseguir descargas para aumentar beneficios.
Garantía: 7 días protegida por Hotmart.
Cierre de ventas: Entrega este enlace en formato HTML cada 2 mensajes de forma obligatoria:
<a href="${linkAfiliado}" target="_blank" style="color: #4f46e5; font-weight: bold; text-decoration: underline;">👉 Haz Clic Aquí para Ver el Curso y Asegurar tu Cupo 📲</a>
`;
        
        const welcomeMessage = `¡Hola! 👋 Soy tu asesor virtual. Si buscas generar ingresos creando aplicaciones móviles sencillas y de éxito ¡Sin Programar!, estás en el lugar correcto. 🚀\n\n¿Tienes alguna duda sobre el temario o te gustaría asegurar tu cupo promocional hoy?`;

        function addMessage(text, role) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add(role === 'user' ? 'user-message' : 'bot-message', 'whitespace-pre-wrap');
            messageDiv.innerHTML = text;
            messageArea.appendChild(messageDiv);
            if (text !== welcomeMessage && !text.startsWith("Escribiendo...")) {
                conversationHistory.push({ role, text });
            }
            messageArea.scrollTop = messageArea.scrollHeight;
        }

        function showLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'loadingIndicator';
            loadingDiv.classList.add('bot-message');
            loadingDiv.innerHTML = `<span>Escribiendo...</span>`;
            messageArea.appendChild(loadingDiv);
            messageArea.scrollTop = messageArea.scrollHeight;
            return loadingDiv;
        }

        function toggleChat() {
            const isOpen = chatWindow.classList.toggle('open');
            if (isOpen && messageArea.children.length === 0) {
                addMessage(welcomeMessage, 'bot');
                conversationHistory = [{ role: 'model', text: welcomeMessage }];
            }
            if (isOpen) userInput.focus();
        }

        async function sendMessage() {
            const userText = userInput.value.trim();
            if (userText === '') return;

            userInput.value = '';
            userInput.disabled = true;
            sendButton.disabled = true;
            addMessage(userText, 'user');

            const contents = conversationHistory.map(msg => ({
                role: msg.role === 'user' ? 'user' : 'model',
                parts: [{ text: msg.text }]
            }));

            const loadingIndicator = showLoading();

            try {
                const payload = {
                    contents: contents,
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                };

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("Error en servidor");

                const result = await response.json();
                
                // Corrección de lectura segura del objeto JSON de Gemini
                const botResponse = result.candidates[0].content.parts[0].text;
                
                loadingIndicator.remove();
                addMessage(botResponse, 'model');
            } catch (error) {
                console.error(error);
                loadingIndicator.remove();
                addMessage("Hubo un error al procesar tu mensaje. Asegúrate de estar abriendo el sitio web desde Netlify en internet.", 'model');
            } finally {
                userInput.disabled = false;
                sendButton.disabled = false;
                userInput.focus();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            toggleChat();
        });
    </script>
</body>
</html>
